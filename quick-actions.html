<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Actions - Mission Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #eaeaea; padding: 20px; }
        h1 { text-align: center; color: #00d9ff; margin-bottom: 30px; font-size: 1.8rem; }
        .hud-container { max-width: 800px; margin: 0 auto; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: #0f3460; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid rgba(0,217,255,0.2); }
        .stat-value { font-size: 2rem; font-weight: bold; color: #00d9ff; }
        .stat-label { font-size: 0.85rem; color: #aaa; margin-top: 5px; }
        .timer-section { background: #0f3460; padding: 25px; border-radius: 12px; text-align: center; margin-bottom: 30px; border: 1px solid rgba(0,217,255,0.2); }
        .timer-display { font-size: 3rem; font-weight: bold; color: #00d9ff; font-family: monospace; margin: 15px 0; }
        .timer-btn { background: #00d9ff; border: none; color: #1a1a2e; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; margin: 5px; }
        .timer-btn.stop { background: #ff6b6b; color: white; }
        .quick-add-section { background: #0f3460; padding: 25px; border-radius: 12px; margin-bottom: 30px; border: 1px solid rgba(0,217,255,0.2); }
        .quick-add-section h3 { margin-bottom: 15px; color: #00d9ff; }
        .quick-add-input { width: 70%; padding: 15px; border: 1px solid #00d9ff; border-radius: 8px; background: #1a1a2e; color: #eaeaea; font-size: 1rem; margin-right: 10px; }
        .quick-add-btn { background: #00d9ff; border: none; color: #1a1a2e; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        .recent-tasks { background: #0f3460; padding: 25px; border-radius: 12px; border: 1px solid rgba(0,217,255,0.2); }
        .recent-tasks h3 { margin-bottom: 15px; color: #00d9ff; }
        .task-item { background: #1a1a2e; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .priority-high { background: #ff6b6b; }
        .priority-medium { background: #ffd93d; color: #333; }
        .priority-low { background: #6bcb77; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #00d9ff; color: #1a1a2e; padding: 15px 25px; border-radius: 8px; font-weight: bold; display: none; }
        .toast.show { display: block; }
    </style>
</head>
<body>
    <h1>Quick Actions HUD</h1>
    <div class="hud-container">
        <div class="stats-row">
            <div class="stat-card"><div class="stat-value" id="totalTasks">0</div><div class="stat-label">Total</div></div>
            <div class="stat-card"><div class="stat-value" id="completedTasks">0</div><div class="stat-label">Done</div></div>
            <div class="stat-card"><div class="stat-value" id="pendingTasks">0</div><div class="stat-label">Pending</div></div>
            <div class="stat-card"><div class="stat-value" id="karmaPoints">0</div><div class="stat-label">Karma</div></div>
        </div>
        <div class="timer-section">
            <h3>Focus Timer</h3>
            <div class="timer-display" id="timerDisplay">00:00:00</div>
            <button class="timer-btn" id="startTimerBtn" onclick="startTimer()">Start</button>
            <button class="timer-btn stop" id="stopTimerBtn" onclick="stopTimer()" style="display:none;">Stop</button>
            <button class="timer-btn" onclick="resetTimer()">Reset</button>
        </div>
        <div class="quick-add-section">
            <h3>Quick Add Task</h3>
            <input type="text" class="quick-add-input" id="quickAddInput" placeholder="Task title...">
            <button class="quick-add-btn" onclick="quickAddTask()">Add</button>
        </div>
        <div class="recent-tasks">
            <h3>Recent Tasks</h3>
            <div id="recentTasksList"></div>
        </div>
    </div>
    <div class="toast" id="toast">Task added!</div>
    <script>
        let timerInterval = null, timerSeconds = 0;
        function loadData() {
            const tasks = JSON.parse(localStorage.getItem("mc_tasks") || "[]");
            const karma = parseInt(localStorage.getItem("mc_karma") || "0");
            document.getElementById("totalTasks").textContent = tasks.length;
            document.getElementById("completedTasks").textContent = tasks.filter(t => t.status === "done").length;
            document.getElementById("pendingTasks").textContent = tasks.filter(t => t.status !== "done").length;
            document.getElementById("karmaPoints").textContent = karma;
            renderRecentTasks(tasks);
        }
        function renderRecentTasks(tasks) {
            const container = document.getElementById("recentTasksList");
            if (!tasks.length) { container.innerHTML = "<p>No tasks yet</p>"; return; }
            container.innerHTML = tasks.slice(-5).reverse().map(t => "<div class=\"task-item\"><span>" + (t.title || "Untitled") + "</span><span class=\"priority-" + (t.priority || "medium") + "\">" + (t.priority || "m").charAt(0).toUpperCase() + "</span></div>").join("");
        }
        function startTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => { timerSeconds++; updateTimerDisplay(); }, 1000);
            document.getElementById("startTimerBtn").style.display = "none";
            document.getElementById("stopTimerBtn").style.display = "inline-block";
        }
        function stopTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            document.getElementById("startTimerBtn").style.display = "inline-block";
            document.getElementById("stopTimerBtn").style.display = "none";
        }
        function resetTimer() { stopTimer(); timerSeconds = 0; updateTimerDisplay(); }
        function updateTimerDisplay() {
            const h = Math.floor(timerSeconds / 3600), m = Math.floor((timerSeconds % 3600) / 60), s = timerSeconds % 60;
            document.getElementById("timerDisplay").textContent = h.toString().padStart(2,"0") + ":" + m.toString().padStart(2,"0") + ":" + s.toString().padStart(2,"0");
        }
        function quickAddTask() {
            const title = document.getElementById("quickAddInput").value.trim();
            if (!title) return;
            const tasks = JSON.parse(localStorage.getItem("mc_tasks") || "[]");
            tasks.push({ id: "task_" + Date.now(), title: title, priority: "medium", status: "todo", createdAt: new Date().toISOString() });
            localStorage.setItem("mc_tasks", JSON.stringify(tasks));
            document.getElementById("quickAddInput").value = "";
            loadData();
            showToast("Task added!");
        }
        function showToast(m) { const t = document.getElementById("toast"); t.textContent = m; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 2000); }
        document.getElementById("quickAddInput").addEventListener("keypress", e => { if (e.key === "Enter") quickAddTask(); });
        loadData();
    </script>
</body>
</html>

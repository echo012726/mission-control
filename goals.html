<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Control - Goals & OKRs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f0f1a;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --accent-start: #667eea;
      --accent-end: #764ba2;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #3b82f6;
      --border: #3d3d5c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    .header {
      background: var(--bg-secondary);
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .back-btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .back-btn:hover { background: var(--border); }
    .header h1 {
      font-size: 20px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-actions { display: flex; gap: 12px; }
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: var(--danger); color: white; }
    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border);
    }
    .stat-card h3 { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: 700; }
    .stat-card .value.success { color: var(--success); }
    .stat-card .value.warning { color: var(--warning); }
    .stat-card .value.info { color: var(--info); }
    .goals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 20px;
    }
    .goal-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .goal-card:hover {
      border-color: var(--accent-start);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    .goal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .goal-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .goal-description { color: var(--text-secondary); font-size: 14px; margin-bottom: 12px; }
    .goal-meta { display: flex; gap: 16px; font-size: 13px; color: var(--text-secondary); }
    .goal-meta span { display: flex; align-items: center; gap: 4px; }
    .progress-bar-container {
      background: var(--bg-tertiary);
      border-radius: 8px;
      height: 12px;
      overflow: hidden;
      margin: 16px 0;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
      border-radius: 8px;
      transition: width 0.5s ease;
    }
    .progress-bar.completed { background: var(--success); }
    .progress-bar.warning { background: var(--warning); }
    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .progress-text .percentage { font-weight: 600; color: var(--accent-start); }
    .key-results {
      border-top: 1px solid var(--border);
      padding-top: 16px;
      margin-top: 16px;
    }
    .key-results h4 { font-size: 14px; color: var(--text-secondary); margin-bottom: 12px; }
    .kr-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .kr-title { font-size: 14px; flex: 1; }
    .kr-progress { font-size: 14px; font-weight: 600; color: var(--info); margin-left: 16px; }
    .kr-actions { display: flex; gap: 8px; margin-left: 12px; }
    .kr-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .kr-btn:hover { background: var(--border); color: var(--text-primary); }
    .goal-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .empty-state h2 { font-size: 24px; margin-bottom: 12px; color: var(--text-primary); }
    .empty-state p { margin-bottom: 24px; }
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.9);
      transition: transform 0.2s;
    }
    .modal-overlay.active .modal { transform: scale(1); }
    .modal h2 { font-size: 20px; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none;
      border-color: var(--accent-start);
    }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
    .kr-form-item { background: var(--bg-tertiary); padding: 12px; border-radius: 8px; margin-bottom: 12px; }
    .add-kr-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .add-kr-btn:hover { border-color: var(--accent-start); color: var(--accent-start); }
    .linked-tasks { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    .linked-tasks h4 { font-size: 14px; color: var(--text-secondary); margin-bottom: 12px; }
    .linked-task-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .linked-task-item .task-title { flex: 1; }
    .linked-task-item .task-status { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .task-status.done { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    .task-status.active { background: rgba(59, 130, 246, 0.2); color: var(--info); }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 1001;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <button class="back-btn" onclick="window.location.href='/'">← Back to Board</button>
      <h1>🎯 Goals & OKRs</h1>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="exportGoals()">📤 Export</button>
      <button class="btn btn-primary" onclick="openGoalModal()">+ New Goal</button>
    </div>
  </header>

  <div class="container">
    <div class="stats-bar">
      <div class="stat-card">
        <h3>Total Goals</h3>
        <div class="value" id="totalGoals">0</div>
      </div>
      <div class="stat-card">
        <h3>Completed</h3>
        <div class="value success" id="completedGoals">0</div>
      </div>
      <div class="stat-card">
        <h3>In Progress</h3>
        <div class="value warning" id="inProgressGoals">0</div>
      </div>
      <div class="stat-card">
        <h3>Avg. Progress</h3>
        <div class="value info" id="avgProgress">0%</div>
      </div>
    </div>

    <div class="goals-grid" id="goalsGrid"></div>
    <div class="empty-state" id="emptyState" style="display: none;">
      <h2>No Goals Yet</h2>
      <p>Create your first goal to start tracking objectives and key results.</p>
      <button class="btn btn-primary" onclick="openGoalModal()">+ Create Goal</button>
    </div>
  </div>

  <!-- Goal Modal -->
  <div class="modal-overlay" id="goalModal">
    <div class="modal">
      <h2 id="goalModalTitle">Create New Goal</h2>
      <form id="goalForm" onsubmit="saveGoal(event)">
        <input type="hidden" id="goalId">
        <div class="form-group">
          <label>Goal Title *</label>
          <input type="text" id="goalTitle" required placeholder="e.g., Launch New Product">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="goalDescription" placeholder="Describe your goal..."></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Target Date</label>
            <input type="date" id="goalTargetDate">
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="goalStatus">
              <option value="active">Active</option>
              <option value="completed">Completed</option>
              <option value="archived">Archived</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Key Results</label>
          <div id="keyResultsForm"></div>
          <button type="button" class="add-kr-btn" onclick="addKeyResultField()">+ Add Key Result</button>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeGoalModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Goal</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Key Result Edit Modal -->
  <div class="modal-overlay" id="krModal">
    <div class="modal">
      <h2>Update Key Result</h2>
      <form id="krForm" onsubmit="saveKeyResult(event)">
        <input type="hidden" id="krGoalId">
        <input type="hidden" id="krId">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" id="krTitle" required placeholder="e.g., Reach 1000 users">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Current Value</label>
            <input type="number" id="krCurrent" min="0" value="0">
          </div>
          <div class="form-group">
            <label>Target Value</label>
            <input type="number" id="krTarget" min="1" value="100">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Unit</label>
            <input type="text" id="krUnit" placeholder="%, users, $, etc." value="%">
          </div>
          <div class="form-group">
            <label>Weight</label>
            <input type="number" id="krWeight" min="1" max="10" value="1">
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-danger" onclick="deleteKeyResult()" style="margin-right:auto">Delete</button>
          <button type="button" class="btn btn-secondary" onclick="closeKrModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Link Tasks Modal -->
  <div class="modal-overlay" id="linkTasksModal">
    <div class="modal">
      <h2>Link Tasks to Goal</h2>
      <input type="hidden" id="linkGoalId">
      <div class="form-group">
        <label>Select Tasks</label>
        <div id="taskList" style="max-height:300px;overflow-y:auto"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" onclick="closeLinkTasksModal()">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveLinkedTasks()">Save Links</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const GOALS_KEY = 'mc_goals';
    const TASKS_KEY = 'mc_tasks';
    let goals = [];
    let tasks = [];
    let keyResultCounter = 0;
    let selectedTasks = new Set();

    document.addEventListener('DOMContentLoaded', () => {
      loadData();
      renderGoals();
      updateStats();
    });

    function loadData() {
      try {
        goals = JSON.parse(localStorage.getItem(GOALS_KEY) || '[]');
        tasks = JSON.parse(localStorage.getItem(TASKS_KEY) || '[]');
      } catch (e) {
        goals = [];
        tasks = [];
      }
    }

    function saveGoals() {
      localStorage.setItem(GOALS_KEY, JSON.stringify(goals));
    }

    function generateId() {
      return 'goal_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    function calculateProgress(goal) {
      if (!goal.keyResults || goal.keyResults.length === 0) {
        if (goal.linkedTasks && goal.linkedTasks.length > 0) {
          const linked = tasks.filter(t => goal.linkedTasks.includes(t.id));
          const completed = linked.filter(t => t.status === 'done').length;
          return linked.length > 0 ? Math.round((completed / linked.length) * 100) : 0;
        }
        return 0;
      }
      let totalWeight = 0;
      let weightedProgress = 0;
      goal.keyResults.forEach(kr => {
        const weight = kr.weight || 1;
        const progress = kr.targetValue > 0 ? Math.min(100, Math.round((kr.currentValue / kr.targetValue) * 100)) : 0;
        totalWeight += weight;
        weightedProgress += progress * weight;
      });
      return totalWeight > 0 ? Math.round(weightedProgress / totalWeight) : 0;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderGoals() {
      const grid = document.getElementById('goalsGrid');
      const empty = document.getElementById('emptyState');
      if (goals.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
        return;
      }
      grid.style.display = 'grid';
      empty.style.display = 'none';
      grid.innerHTML = goals.map(goal => {
        const progress = calculateProgress(goal);
        const progressClass = progress >= 100 ? 'completed' : progress >= 50 ? '' : 'warning';
        const targetDate = goal.targetDate ? new Date(goal.targetDate).toLocaleDateString() : 'No deadline';
        const linkedTaskList = goal.linkedTasks ? tasks.filter(t => goal.linkedTasks.includes(t.id)).slice(0, 3) : [];
        return '<div class="goal-card">' +
          '<div class="goal-header">' +
            '<div>' +
              '<div class="goal-title">' + escapeHtml(goal.title) + '</div>' +
              (goal.description ? '<div class="goal-description">' + escapeHtml(goal.description) + '</div>' : '') +
            '</div>' +
            '<span class="task-status ' + (goal.status === 'completed' ? 'done' : 'active') + '">' +
              (goal.status === 'completed' ? '✓ Done' : 'In Progress') + '</span>' +
          '</div>' +
          '<div class="goal-meta"><span>📅 ' + targetDate + '</span><span>🎯 ' + (goal.keyResults?.length || 0) + ' Key Results</span><span>📝 ' + (goal.linkedTasks?.length || 0) + ' Tasks</span></div>' +
          '<div class="progress-bar-container"><div class="progress-bar ' + progressClass + '" style="width:' + progress + '%"></div></div>' +
          '<div class="progress-text"><span class="percentage">' + progress + '% Complete</span><span>' + (progress >= 100 ? '🎉 Goal Achieved!' : (100 - progress) + '% remaining') + '</span></div>' +
          (goal.keyResults && goal.keyResults.length > 0 ? '<div class="key-results"><h4>Key Results</h4>' + goal.keyResults.map(kr => {
            return '<div class="kr-item"><span class="kr-title">' + escapeHtml(kr.title) + '</span><span class="kr-progress">' + kr.currentValue + ' / ' + kr.targetValue + ' ' + kr.unit + '</span><div class="kr-actions"><button class="kr-btn" onclick="editKeyResult(\'' + goal.id + '\',\'' + kr.id + '\')">✏️</button><button class="kr-btn" onclick="incrementKR(\'' + goal.id + '\',\'' + kr.id + '\')">+</button></div></div>';
          }).join('') + '</div>' : '') +
          (linkedTaskList.length > 0 ? '<div class="linked-tasks"><h4>Linked Tasks</h4>' + linkedTaskList.map(t => '<div class="linked-task-item"><span class="task-title">' + escapeHtml(t.title) + '</span><span class="task-status ' + (t.status === 'done' ? 'done' : 'active') + '">' + (t.status === 'done' ? '✓ Done' : '○ Active') + '</span></div>').join('') + '</div>' : '') +
          '<div class="goal-actions">' +
            '<button class="btn btn-secondary" onclick="openLinkTasksModal(\'' + goal.id + '\')">🔗 Link Tasks</button>' +
            '<button class="btn btn-secondary" onclick="editGoal(\'' + goal.id + '\')">✏️ Edit</button>' +
            '<button class="btn btn-danger" onclick="deleteGoal(\'' + goal.id + '\')">🗑️ Delete</button>' +
          '</div></div>';
      }).join('');
    }

    function updateStats() {
      const total = goals.length;
      const completed = goals.filter(g => g.status === 'completed').length;
      const inProgress = goals.filter(g => g.status === 'active').length;
      const avgProgress = goals.length > 0 ? Math.round(goals.reduce((sum, g) => sum + calculateProgress(g), 0) / goals.length) : 0;
      document.getElementById('totalGoals').textContent = total;
      document.getElementById('completedGoals').textContent = completed;
      document.getElementById('inProgressGoals').textContent = inProgress;
      document.getElementById('avgProgress').textContent = avgProgress + '%';
    }

    function openGoalModal(goalId = null) {
      const modal = document.getElementById('goalModal');
      const form = document.getElementById('goalForm');
      const title = document.getElementById('goalModalTitle');
      if (goalId) {
        const goal = goals.find(g => g.id === goalId);
        if (goal) {
          title.textContent = 'Edit Goal';
          document.getElementById('goalId').value = goal.id;
          document.getElementById('goalTitle').value = goal.title;
          document.getElementById('goalDescription').value = goal.description || '';
          document.getElementById('goalTargetDate').value = goal.targetDate || '';
          document.getElementById('goalStatus').value = goal.status || 'active';
          const krContainer = document.getElementById('keyResultsForm');
          krContainer.innerHTML = '';
          (goal.keyResults || []).forEach(kr => addKeyResultField(kr));
        }
      } else {
        title.textContent = 'Create New Goal';
        form.reset();
        document.getElementById('goalId').value = '';
        document.getElementById('keyResultsForm').innerHTML = '';
        addKeyResultField();
      }
      modal.classList.add('active');
    }

    function closeGoalModal() { document.getElementById('goalModal').classList.remove('active'); }

    function addKeyResultField(kr = null) {
      const container = document.getElementById('keyResultsForm');
      const id = 'kr_' + Date.now() + '_' + keyResultCounter++;
      const div = document.createElement('div');
      div.className = 'kr-form-item';
      div.dataset.id = id;
      div.innerHTML = '<div class="form-row"><input type="text" placeholder="Key Result title" class="kr-title-input" value="' + (kr ? escapeHtml(kr.title) : '') + '" style="flex:1"><button type="button" class="kr-btn" onclick="this.closest(\'.kr-form-item\').remove()">✕</button></div><div class="form-row"><input type="number" placeholder="Current" class="kr-current-input" value="' + (kr ? kr.currentValue : 0) + '" min="0"><input type="number" placeholder="Target" class="kr-target-input" value="' + (kr ? kr.targetValue : 100) + '" min="1"><input type="text" placeholder="Unit" class="kr-unit-input" value="' + (kr ? kr.unit : '%') + '" style="width:80px"><input type="number" placeholder="Weight" class="kr-weight-input" value="' + (kr ? kr.weight : 1) + '" min="1" max="10" style="width:80px"></div>';
      container.appendChild(div);
    }

    function saveGoal(e) {
      e.preventDefault();
      const goalId = document.getElementById('goalId').value;
      const title = document.getElementById('goalTitle').value.trim();
      const description = document.getElementById('goalDescription').value.trim();
      const targetDate = document.getElementById('goalTargetDate').value;
      const status = document.getElementById('goalStatus').value;
      const keyResults = [];
      document.querySelectorAll('.kr-form-item').forEach(item => {
        const krTitle = item.querySelector('.kr-title-input').value.trim();
        if (krTitle) {
          keyResults.push({
            id: item.dataset.id,
            title: krTitle,
            currentValue: parseInt(item.querySelector('.kr-current-input').value) || 0,
            targetValue: parseInt(item.querySelector('.kr-target-input').value) || 100,
            unit: item.querySelector('.kr-unit-input').value || '%',
            weight: parseInt(item.querySelector('.kr-weight-input').value) || 1
          });
        }
      });
      if (goalId) {
        const index = goals.findIndex(g => g.id === goalId);
        if (index !== -1) {
          goals[index] = { ...goals[index], title, description, targetDate, status, keyResults, updatedAt: new Date().toISOString() };
        }
      } else {
        goals.push({ id: generateId(), title, description, targetDate, status, keyResults, linkedTasks: [], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
      }
      saveGoals();
      renderGoals();
      updateStats();
      closeGoalModal();
      showToast('Goal saved successfully!');
    }

    function editGoal(goalId) { openGoalModal(goalId); }

    function deleteGoal(goalId) {
      if (confirm('Are you sure you want to delete this goal?')) {
        goals = goals.filter(g => g.id !== goalId);
        saveGoals();
        renderGoals();
        updateStats();
        showToast('Goal deleted');
      }
    }

    function editKeyResult(goalId, krId) {
      const goal = goals.find(g => g.id === goalId);
      if (!goal) return;
      const kr = goal.keyResults.find(k => k.id === krId);
      if (!kr) return;
      document.getElementById('krGoalId').value = goalId;
      document.getElementById('krId').value = krId;
      document.getElementById('krTitle').value = kr.title;
      document.getElementById('krCurrent').value = kr.currentValue;
      document.getElementById('krTarget').value = kr.targetValue;
      document.getElementById('krUnit').value = kr.unit;
      document.getElementById('krWeight').value = kr.weight;
      document.getElementById('krModal').classList.add('active');
    }

    function closeKrModal() { document.getElementById('krModal').classList.remove('active'); }

    function saveKeyResult(e) {
      e.preventDefault();
      const goalId = document.getElementById('krGoalId').value;
      const krId = document.getElementById('krId').value;
      const goal = goals.find(g => g.id === goalId);
      if (!goal) return;
      const krIndex = goal.keyResults.findIndex(k => k.id === krId);
      if (krIndex !== -1) {
        goal.keyResults[krIndex] = {
          ...goal.keyResults[krIndex],
          title: document.getElementById('krTitle').value.trim(),
          currentValue: parseInt(document.getElementById('krCurrent').value) || 0,
          targetValue: parseInt(document.getElementById('krTarget').value) || 100,
          unit: document.getElementById('krUnit').value || '%',
          weight: parseInt(document.getElementById('krWeight').value) || 1
        };
        goal.updatedAt = new Date().toISOString();
        saveGoals();
        renderGoals();
        updateStats();
        closeKrModal();
        showToast('Key Result updated!');
      }
    }

    function incrementKR(goalId, krId) {
      const goal = goals.find(g => g.id === goalId);
      if (!goal) return;
      const kr = goal.keyResults.find(k => k.id === krId);
      if (kr) {
        const increment = Math.max(1, Math.round(kr.targetValue * 0.1));
        kr.currentValue = Math.min(kr.targetValue, kr.currentValue + increment);
        goal.updatedAt = new Date().toISOString();
        saveGoals();
        renderGoals();
        updateStats();
        showToast('Key Result updated: ' + kr.currentValue + '/' + kr.targetValue + ' ' + kr.unit);
      }
    }

    function deleteKeyResult() {
      const goalId = document.getElementById('krGoalId').value;
      const krId = document.getElementById('krId').value;
      const goal = goals.find(g => g.id === goalId);
      if (!goal) return;
      if (confirm('Delete this key result?')) {
        goal.keyResults = goal.keyResults.filter(k => k.id !== krId);
        goal.updatedAt = new Date().toISOString();
        saveGoals();
        renderGoals();
        updateStats();
        closeKrModal();
        showToast('Key Result deleted');
      }
    }

    function openLinkTasksModal(goalId) {
      document.getElementById('linkGoalId').value = goalId;
      const goal = goals.find(g => g.id === goalId);
      const linkedIds = goal?.linkedTasks || [];
      selectedTasks = new Set(linkedIds);
      const container = document.getElementById('taskList');
      if (tasks.length === 0) {
        container.innerHTML = '<p style="color:var(--text-secondary)">No tasks available. Create tasks in the main board first.</p>';
      } else {
        container.innerHTML = tasks.map(t => '<div class="linked-task-item" style="cursor:pointer"><input type="checkbox" id="task_' + t.id + '" ' + (linkedIds.includes(t.id) ? 'checked' : '') + ' onchange="toggleTaskLink(\'' + t.id + '\')" style="margin-right:8px"><span class="task-title">' + escapeHtml(t.title) + '</span><span class="task-status ' + (t.status === 'done' ? 'done' : 'active') + '">' + (t.status === 'done' ? '✓ Done' : '○') + '</span></div>').join('');
      }
      document.getElementById('linkTasksModal').classList.add('active');
    }

    function closeLinkTasksModal() { document.getElementById('linkTasksModal').classList.remove('active'); }

    function toggleTaskLink(taskId) {
      if (selectedTasks.has(taskId)) { selectedTasks.delete(taskId); }
      else { selectedTasks.add(taskId); }
    }

    function saveLinkedTasks() {
      const goalId = document.getElementById('linkGoalId').value;
      const goal = goals.find(g => g.id === goalId);
      if (goal) {
        goal.linkedTasks = Array.from(selectedTasks);
        goal.updatedAt = new Date().toISOString();
        saveGoals();
        renderGoals();
        updateStats();
        closeLinkTasksModal();
        showToast('Tasks linked to goal!');
      }
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function exportGoals() {
      const data = JSON.stringify(goals, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'goals-export-' + new Date().toISOString().split('T')[0] + '.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Goals exported!');
    }
  </script>
</body>
</html>
